server.port=${PORT:8080}

# Spotify credentials - set these as Railway environment variables
spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.refresh-token=${SPOTIFY_REFRESH_TOKEN:}

# OAuth callback URL - must match the redirect URI registered in Spotify dashboard
spotify.callback-url=${SPOTIFY_CALLBACK_URL:http://localhost:8080/auth/callback}

# CORS - set to your portfolio domain
spotify.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Cache settings (seconds)
spotify.cache.now-playing-ttl=10
spotify.cache.recently-played-ttl=120
spotify.cache.random-track-ttl=0

spotify.auth.enabled=false

# News API - set NEWS_API_KEY in Railway (get a free key at newsapi.org)
news.api-key=${NEWS_API_KEY:}
news.cache.headlines-ttl-seconds=300
